<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Renderable — Scan Library</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #0a0a0a; --surface: #141414;
            --border: rgba(255,255,255,0.08); --text: #f0f0f0;
            --muted: rgba(255,255,255,0.45); --accent: #4f8ef7;
            --danger: #e05252; --radius: 12px;
        }
        body { background: var(--bg); color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            min-height: 100vh; padding-bottom: 60px; }

        header { padding: 24px 20px 16px; border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between;
            position: sticky; top: 0; background: var(--bg); z-index: 10;
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
        header h1 { font-size: 20px; font-weight: 700; letter-spacing: 0.5px; }
        header span { font-size: 12px; color: var(--muted);
            background: rgba(255,255,255,0.07); padding: 4px 10px;
            border-radius: 20px; border: 1px solid var(--border); }

        #search-wrap { padding: 16px 20px 8px; }
        #search { width: 100%; background: var(--surface);
            border: 1px solid var(--border); border-radius: 10px;
            padding: 10px 14px; color: var(--text); font-size: 14px;
            outline: none; transition: border-color 0.2s; }
        #search:focus { border-color: var(--accent); }
        #search::placeholder { color: var(--muted); }

        #grid { display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px; padding: 16px 20px; }

        .card { background: var(--surface); border: 1px solid var(--border);
            border-radius: var(--radius); overflow: hidden;
            transition: border-color 0.2s, transform 0.15s; }
        .card:hover { border-color: rgba(255,255,255,0.18); transform: translateY(-2px); }

        .card-thumb-wrap { position: relative; }
        .card-thumb { width: 100%; aspect-ratio: 16/9; object-fit: cover;
            display: block; background: #1a1a1a; }
        .card-thumb-placeholder { width: 100%; aspect-ratio: 16/9;
            background: linear-gradient(135deg, #1a1a1a, #222);
            display: flex; align-items: center; justify-content: center;
            font-size: 36px; color: rgba(255,255,255,0.12); }

        /* Lead badge on thumbnail */
        .lead-badge {
            position: absolute; top: 8px; right: 8px;
            background: var(--accent); color: #fff;
            font-size: 11px; font-weight: 700;
            padding: 3px 8px; border-radius: 20px;
            display: none;
        }

        .card-body { padding: 14px 16px; }
        .card-name { font-size: 15px; font-weight: 600; margin-bottom: 4px;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .card-meta { font-size: 12px; color: var(--muted);
            display: flex; gap: 10px; margin-bottom: 14px; }
        .card-actions { display: flex; gap: 6px; }

        .btn { flex: 1; padding: 8px 0; border-radius: 8px;
            border: 1px solid var(--border); background: rgba(255,255,255,0.06);
            color: var(--text); font-size: 12px; font-weight: 500; cursor: pointer;
            transition: background 0.15s, border-color 0.15s; text-align: center;
            text-decoration: none; display: flex; align-items: center;
            justify-content: center; gap: 4px; min-width: 0; }
        .btn:hover { background: rgba(255,255,255,0.12); border-color: rgba(255,255,255,0.2); }
        .btn-primary { background: var(--accent); border-color: var(--accent); color: #fff; }
        .btn-primary:hover { background: #6a9ff8; border-color: #6a9ff8; }
        .btn-danger:hover { background: rgba(224,82,82,0.15);
            border-color: var(--danger); color: var(--danger); }

        #empty { display: none; flex-direction: column; align-items: center;
            justify-content: center; padding: 80px 20px; gap: 12px; text-align: center; }
        #empty .empty-icon { opacity: 0.3; display: flex; }
        #empty h2 { font-size: 18px; font-weight: 600; opacity: 0.7; }
        #empty p  { font-size: 14px; color: var(--muted); max-width: 260px; }

        #loading-state { display: flex; align-items: center; justify-content: center;
            padding: 80px 20px; gap: 12px; color: var(--muted); font-size: 14px; }

        .spinner { width: 20px; height: 20px;
            border: 2px solid rgba(255,255,255,0.1); border-top-color: var(--accent);
            border-radius: 50%; animation: spin 0.75s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        #modal-backdrop { display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.7); z-index: 50;
            align-items: center; justify-content: center; backdrop-filter: blur(4px); }
        #modal-backdrop.visible { display: flex; }
        #modal { background: #1c1c1c; border: 1px solid var(--border);
            border-radius: 16px; padding: 24px; width: min(360px, 90vw);
            display: flex; flex-direction: column; gap: 16px; }
        #modal h3 { font-size: 17px; font-weight: 600; }
        #modal input { background: var(--surface); border: 1px solid var(--border);
            border-radius: 8px; padding: 10px 12px; color: var(--text);
            font-size: 15px; outline: none; width: 100%; }
        #modal input:focus { border-color: var(--accent); }
        #modal-actions { display: flex; gap: 8px; }

        #toast { position: fixed; bottom: 24px; left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: #1e1e1e; border: 1px solid var(--border);
            color: var(--text); padding: 10px 20px; border-radius: 20px;
            font-size: 13px; opacity: 0; transition: opacity 0.3s, transform 0.3s;
            z-index: 100; white-space: nowrap; }
        #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>

<header>
    <h1>Renderable</h1>
    <span id="scan-count">Loading...</span>
</header>

<div id="search-wrap">
    <input id="search" type="search" placeholder="Search scans..." oninput="filterScans()">
</div>

<div id="loading-state">
    <div class="spinner"></div>
    Loading scans...
</div>

<div id="empty">
    <div class="empty-icon">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="7" width="18" height="14" rx="1"/><path d="M3 11h18M9 7V4h6v3"/><path d="M9 15h2v6H9zM13 15h2v6h-2z"/></svg>
    </div>
    <h2>No captures yet</h2>
    <p>Upload a capture from the Renderable iOS app to get started.</p>
</div>

<div id="grid"></div>

<div id="modal-backdrop">
    <div id="modal">
        <h3>Rename Scan</h3>
        <input id="modal-input" type="text" placeholder="Scan name" maxlength="80">
        <div id="modal-actions">
            <button class="btn" onclick="closeModal()">Cancel</button>
            <button class="btn btn-primary" onclick="confirmRename()">Save</button>
        </div>
    </div>
</div>

<div id="toast"></div>

<script>
let allScans = [];
let renamingScanId = null;

const IC_VIEW   = `<svg width="11" height="11" viewBox="0 0 12 12"><path fill="currentColor" d="M2.5 1.5l8 4.5-8 4.5z"/></svg>`;
const IC_SHARE  = `<svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="13" cy="3" r="1.8"/><circle cx="3" cy="8" r="1.8"/><circle cx="13" cy="13" r="1.8"/><path d="M4.7 9l6.6 2.8M11.3 4.2L4.7 7"/></svg>`;
const IC_LEADS  = `<svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="8" cy="5" r="3"/><path d="M2 14c0-3.3 2.7-6 6-6s6 2.7 6 6"/></svg>`;
const IC_STATS  = `<svg width="13" height="13" viewBox="0 0 16 16"><rect x="2" y="9" width="3" height="5" rx="1" fill="currentColor"/><rect x="6.5" y="5" width="3" height="9" rx="1" fill="currentColor"/><rect x="11" y="2" width="3" height="12" rx="1" fill="currentColor"/></svg>`;
const IC_ROOMS  = `<svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1.5" y="1.5" width="5.5" height="5.5" rx="1"/><rect x="9" y="1.5" width="5.5" height="5.5" rx="1"/><rect x="1.5" y="9" width="5.5" height="5.5" rx="1"/><rect x="9" y="9" width="5.5" height="5.5" rx="1"/></svg>`;
const IC_EDIT   = `<svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M11 2l3 3-9 9H2v-3z"/></svg>`;
const IC_TRASH  = `<svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 4h10M6 4V2h4v2M5 4l.7 10h4.6L11 4"/></svg>`;
const IC_BLDG   = `<svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="7" width="18" height="14" rx="1"/><path d="M3 11h18M9 7V4h6v3"/><path d="M9 15h2v6H9zM13 15h2v6h-2z"/></svg>`;

async function loadScans() {
    try {
        const res = await fetch("/api/scans");
        if (!res.ok) throw new Error("Failed to load scans");
        allScans = await res.json();
        document.getElementById("loading-state").style.display = "none";
        document.getElementById("scan-count").textContent =
            allScans.length === 1 ? "1 scan" : `${allScans.length} scans`;
        if (allScans.length === 0) {
            document.getElementById("empty").style.display = "flex";
        } else {
            renderScans(allScans);
        }
    } catch (e) {
        document.getElementById("loading-state").innerHTML =
            `<span style="color:#e05252">Failed to load scans: ${e.message}</span>`;
    }
}

function renderScans(scans) {
    const grid = document.getElementById("grid");
    grid.innerHTML = "";
    if (scans.length === 0) {
        grid.innerHTML = `<p style="color:var(--muted);padding:20px;font-size:14px">No scans match your search.</p>`;
        return;
    }
    scans.forEach(scan => {
        const card = document.createElement("div");
        card.className = "card";
        card.dataset.scanId = scan.scan_id;

        const leadCount  = scan.lead_count || 0;
        const badgeHTML  = leadCount > 0
            ? `<div class="lead-badge" style="display:block">${leadCount} lead${leadCount !== 1 ? "s" : ""}</div>`
            : `<div class="lead-badge"></div>`;

        const thumbHTML = scan.thumbnail_url
            ? `<img class="card-thumb" src="${scan.thumbnail_url}" alt="thumbnail" loading="lazy"
                onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
              + `<div class="card-thumb-placeholder" style="display:none">${IC_BLDG}</div>`
            : `<div class="card-thumb-placeholder">${IC_BLDG}</div>`;

        card.innerHTML = `
            <div class="card-thumb-wrap">
                ${thumbHTML}
                ${badgeHTML}
            </div>
            <div class="card-body">
                <div class="card-name" title="${esc(scan.scan_name)}">${esc(scan.scan_name)}</div>
                <div class="card-meta">
                    <span>${formatDate(scan.created_at)}</span>
                    <span>${scan.frame_count} frames</span>
                    ${leadCount > 0 ? `<span style="color:var(--accent)">${leadCount} lead${leadCount !== 1 ? "s" : ""}</span>` : ""}
                </div>
                <div class="card-actions">
                    <a class="btn btn-primary" href="${scan.viewer_url}" target="_blank" title="View">${IC_VIEW}</a>
                    <a class="btn" href="/share/${scan.scan_id}" target="_blank" title="Share page">${IC_SHARE}</a>
                    <a class="btn" href="/scan/${scan.scan_id}/leads" title="Leads">${IC_LEADS}</a>
                    <a class="btn" href="/scan/${scan.scan_id}/analytics" title="Analytics">${IC_STATS}</a>
                    <a class="btn" href="/scan/${scan.scan_id}/edit" title="Edit rooms">${IC_ROOMS}</a>
                    <a class="btn" href="/listing/${scan.scan_id}/edit" title="Edit listing">${IC_EDIT}</a>
                    <button class="btn btn-danger" onclick="deleteScan('${scan.scan_id}')" title="Delete">${IC_TRASH}</button>
                </div>
            </div>
        `;
        grid.appendChild(card);
    });
}

function filterScans() {
    const q = document.getElementById("search").value.trim().toLowerCase();
    const filtered = q
        ? allScans.filter(s => s.scan_name.toLowerCase().includes(q) || s.scan_id.includes(q))
        : allScans;
    renderScans(filtered);
}

function openRename(scanId, currentName) {
    renamingScanId = scanId;
    document.getElementById("modal-input").value = currentName;
    document.getElementById("modal-backdrop").classList.add("visible");
    setTimeout(() => document.getElementById("modal-input").focus(), 100);
}

function closeModal() {
    renamingScanId = null;
    document.getElementById("modal-backdrop").classList.remove("visible");
}

async function confirmRename() {
    const newName = document.getElementById("modal-input").value.trim();
    if (!newName || !renamingScanId) return;
    try {
        const res = await fetch(`/api/scans/${renamingScanId}/rename`, {
            method: "PATCH",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ scan_name: newName })
        });
        if (!res.ok) throw new Error("Rename failed");
        const scan = allScans.find(s => s.scan_id === renamingScanId);
        if (scan) scan.scan_name = newName;
        closeModal();
        renderScans(allScans);
        showToast("Scan renamed");
    } catch (e) {
        showToast("Failed to rename: " + e.message);
    }
}

async function deleteScan(scanId) {
    const scan = allScans.find(s => s.scan_id === scanId);
    const name = scan ? scan.scan_name : scanId;
    if (!confirm(`Delete "${name}"? This cannot be undone.`)) return;
    try {
        const res = await fetch(`/api/scans/${scanId}`, { method: "DELETE" });
        if (!res.ok) throw new Error("Delete failed");
        allScans = allScans.filter(s => s.scan_id !== scanId);
        document.getElementById("scan-count").textContent =
            allScans.length === 1 ? "1 scan" : `${allScans.length} scans`;
        if (allScans.length === 0) {
            document.getElementById("grid").innerHTML = "";
            document.getElementById("empty").style.display = "flex";
        } else {
            renderScans(allScans);
        }
        showToast("Scan deleted");
    } catch (e) {
        showToast("Failed to delete: " + e.message);
    }
}

function showToast(msg) {
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.classList.add("show");
    setTimeout(() => t.classList.remove("show"), 4000);
}

function esc(str) {
    return String(str)
        .replace(/&/g, "&amp;").replace(/"/g, "&quot;")
        .replace(/</g, "&lt;").replace(/>/g, "&gt;");
}

function formatDate(iso) {
    if (!iso) return "Unknown date";
    try {
        const d    = new Date(iso);
        const now  = new Date();
        const diff = Math.floor((now - d) / 1000);
        let relative;
        if      (diff < 60)     relative = "just now";
        else if (diff < 3600)   relative = `${Math.floor(diff/60)}m ago`;
        else if (diff < 86400)  relative = `${Math.floor(diff/3600)}h ago`;
        else if (diff < 604800) relative = `${Math.floor(diff/86400)}d ago`;
        else                    relative = d.toLocaleDateString();
        return `<span title="${d.toLocaleString()}">${relative}</span>`;
    } catch { return "Unknown date"; }
}

document.addEventListener("keydown", e => {
    if (e.key === "Escape") closeModal();
    if (e.key === "Enter" && renamingScanId) confirmRename();
});

document.getElementById("modal-backdrop").addEventListener("click", e => {
    if (e.target === document.getElementById("modal-backdrop")) closeModal();
});

loadScans();
</script>
</body>
</html>
