<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Renderable Viewer</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        h1 { color: white; font-family: sans-serif; margin-bottom: 24px; }
        model-viewer { width: 100vw; height: 85vh; }
    </style>
</head>
<body>
    <h1>Renderable</h1>
    <model-viewer
        src="/uploads/{{ scan_id }}/scan.usdz"
        ar
        ar-modes="webxr scene-viewer quick-look"
        camera-controls
        auto-rotate
        shadow-intensity="1">
    </model-viewer>
</body>
</html>
