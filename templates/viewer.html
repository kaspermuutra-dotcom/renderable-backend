<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>Renderable Viewer</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            width: 100%; height: 100%;
            background: #000;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            color: #fff;
            -webkit-tap-highlight-color: transparent;
        }

        /* ── Viewer canvas ──────────────────────────────────────────────── */

        #viewer {
            position: fixed; inset: 0;
            cursor: grab;
            user-select: none;
            -webkit-user-select: none;
            touch-action: pan-y; /* let vertical scroll pass through until axis is locked */
        }
        #viewer.dragging { cursor: grabbing; }

        /* Two img layers; only one is visible at a time */
        .layer {
            position: absolute; inset: 0;
            width: 100%; height: 100%;
            object-fit: cover;
            pointer-events: none;
            -webkit-user-drag: none;
            display: block;
        }
        #layer-a { z-index: 1; opacity: 1; }
        #layer-b { z-index: 2; opacity: 0; }

        /* ── Top bar ────────────────────────────────────────────────────── */

        #topbar {
            position: fixed; top: 0; left: 0; right: 0;
            z-index: 20;
            display: flex; align-items: center; justify-content: space-between;
            padding: 16px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.65) 0%, transparent 100%);
            pointer-events: none;
        }

        #scan-name {
            font-size: 13px; font-weight: 700; letter-spacing: 0.5px;
            text-transform: uppercase;
            text-shadow: 0 1px 4px rgba(0,0,0,0.8);
            max-width: 55vw;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }

        #hud {
            font-size: 11px; font-weight: 600;
            color: rgba(255,255,255,0.6);
            background: rgba(0,0,0,0.45);
            padding: 4px 10px; border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.12);
            letter-spacing: 0.3px;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }

        /* ── Drag hint ──────────────────────────────────────────────────── */

        #drag-hint {
            position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%);
            z-index: 20;
            font-size: 11px; color: rgba(255,255,255,0.35);
            pointer-events: none;
            transition: opacity 0.6s ease;
            white-space: nowrap;
        }
        #drag-hint.gone { opacity: 0; }

        /* ── Loading screen ─────────────────────────────────────────────── */

        #loading {
            position: fixed; inset: 0; z-index: 99;
            background: #000;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center; gap: 16px;
            transition: opacity 0.3s ease;
        }
        #loading.fade { opacity: 0; pointer-events: none; }

        .spinner {
            width: 36px; height: 36px;
            border: 2.5px solid rgba(255,255,255,0.1);
            border-top-color: #00C47A;
            border-radius: 50%;
            animation: spin 0.75s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .load-text { font-size: 12px; color: rgba(255,255,255,0.35); letter-spacing: 0.5px; }

        /* ── Error screen ───────────────────────────────────────────────── */

        #error {
            display: none; /* toggled to flex */
            position: fixed; inset: 0; z-index: 99;
            background: #000;
            flex-direction: column; align-items: center; justify-content: center;
            gap: 10px; padding: 32px; text-align: center;
        }
        #error.show { display: flex; }

        .err-icon { color: #e05252; margin-bottom: 4px; }
        #err-msg { font-size: 15px; color: rgba(255,255,255,0.75); max-width: 300px; }
        #err-sub { font-size: 12px; color: rgba(255,255,255,0.35); }
    </style>
</head>
<body>

<!-- Loading -->
<div id="loading">
    <div class="spinner"></div>
    <div class="load-text">Loading capture…</div>
</div>

<!-- Error -->
<div id="error">
    <div class="err-icon">
        <svg width="38" height="38" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="1.5"
             stroke-linecap="round" stroke-linejoin="round">
            <path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/>
            <line x1="12" y1="9" x2="12" y2="13"/>
            <line x1="12" y1="17" x2="12.01" y2="17"/>
        </svg>
    </div>
    <p id="err-msg">Could not load this tour.</p>
    <p id="err-sub">Check your connection and refresh.</p>
</div>

<!-- Viewer -->
<div id="viewer">
    <img id="layer-a" class="layer" src="" alt="">
    <img id="layer-b" class="layer" src="" alt="">
</div>

<div id="topbar">
    <div id="scan-name"></div>
    <div id="hud">— / —</div>
</div>

<div id="drag-hint">Drag to rotate</div>

<script>
"use strict";

// ─── Config ──────────────────────────────────────────────────────────────────

const SCAN_ID       = "{{ scan_id }}";
const PX_PER_FRAME  = 5;      // pixels of horizontal drag to advance one frame
const CROSSFADE_MS  = 80;     // crossfade duration in ms
const AUTOPLAY_FPS  = 0.5;    // frames per second during intro spin
const AUTOPLAY_MS   = 3000;   // total intro duration in ms

// ─── DOM ─────────────────────────────────────────────────────────────────────

const $loading  = document.getElementById("loading");
const $error    = document.getElementById("error");
const $errMsg   = document.getElementById("err-msg");
const $viewer   = document.getElementById("viewer");
const $la       = document.getElementById("layer-a");
const $lb       = document.getElementById("layer-b");
const $name     = document.getElementById("scan-name");
const $hud      = document.getElementById("hud");
const $hint     = document.getElementById("drag-hint");

// ─── State ───────────────────────────────────────────────────────────────────

let frames   = [];   // [{filename, yaw}, ...] sorted by yaw ascending
let urls     = [];   // parallel image URL array
let current  = 0;
let front    = "a";  // "a" | "b" — which layer is foreground
let inFade   = false;

// Drag
let dragging    = false;
let lastX       = 0;
let accumPx     = 0;

// Touch axis detection
let txStart = 0;
let tyStart = 0;
let tAxis   = null; // null | "h" | "v"

// ─── Analytics ───────────────────────────────────────────────────────────────

const SID = Math.random().toString(36).slice(2, 10);

function track(evt, extra) {
    const payload = Object.assign({
        scan_id:    SCAN_ID,
        session_id: SID,
        event_type: evt,
        source:     "viewer",
    }, extra || {});
    const blob = new Blob([JSON.stringify(payload)], { type: "application/json" });
    if (navigator.sendBeacon) {
        navigator.sendBeacon("/analytics/event", blob);
    } else {
        fetch("/analytics/event", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
            keepalive: true,
        }).catch(() => {});
    }
}

window.addEventListener("pagehide", () => track("session_end"));
document.addEventListener("visibilitychange", () => {
    if (document.visibilityState === "hidden") track("session_end");
});

// ─── Layer helpers ───────────────────────────────────────────────────────────

function fEl() { return front === "a" ? $la : $lb; }
function bEl() { return front === "a" ? $lb : $la; }

// ─── HUD ─────────────────────────────────────────────────────────────────────

function updateHUD() {
    const f = frames[current];
    const yawStr = f ? `${Math.round(f.yaw)}°` : "—";
    $hud.textContent = `${current + 1} / ${frames.length}  ·  ${yawStr}`;
}

// ─── Show frame ──────────────────────────────────────────────────────────────

function showFrame(idx, instant) {
    const n = frames.length;
    if (!n) return;
    idx = ((idx % n) + n) % n;

    // During rapid drag, skip crossfade and update front layer directly.
    if (inFade && !instant) {
        current = idx;
        fEl().src = urls[idx];
        updateHUD();
        return;
    }

    current = idx;
    const url  = urls[idx];
    const fore = fEl();
    const back = bEl();

    updateHUD();

    if (instant) {
        fore.src              = url;
        fore.style.transition = "none";
        fore.style.opacity    = "1";
        back.style.transition = "none";
        back.style.opacity    = "0";
        back.src              = "";
        return;
    }

    inFade = true;

    // Stage back layer off-screen, load new URL.
    back.style.transition = "none";
    back.style.opacity    = "0";
    back.src              = url;

    function doFade() {
        back.style.transition = `opacity ${CROSSFADE_MS}ms linear`;
        back.style.opacity    = "1";
        setTimeout(() => {
            fore.style.transition = "none";
            fore.style.opacity    = "0";
            front  = front === "a" ? "b" : "a";
            inFade = false;
        }, CROSSFADE_MS + 10);
    }

    if (back.complete && back.naturalWidth) {
        doFade();
    } else {
        back.onload = back.onerror = function () {
            back.onload = back.onerror = null;
            doFade();
        };
    }
}

function stepBy(delta) {
    const n = frames.length;
    if (!n) return;
    showFrame(((current + delta) % n + n) % n);
}

// ─── Drag accumulator ────────────────────────────────────────────────────────

function flushAccum() {
    while (accumPx <= -PX_PER_FRAME) {
        accumPx += PX_PER_FRAME;
        stepBy(1);   // drag left → advance (higher yaw)
    }
    while (accumPx >= PX_PER_FRAME) {
        accumPx -= PX_PER_FRAME;
        stepBy(-1);  // drag right → retreat (lower yaw)
    }
}

// ─── Mouse events ────────────────────────────────────────────────────────────

$viewer.addEventListener("mousedown", e => {
    dragging = true;
    lastX    = e.clientX;
    accumPx  = 0;
    $viewer.classList.add("dragging");
    e.preventDefault();
});

document.addEventListener("mousemove", e => {
    if (!dragging) return;
    accumPx += e.clientX - lastX;
    lastX    = e.clientX;
    flushAccum();
});

document.addEventListener("mouseup", () => {
    if (!dragging) return;
    dragging = false;
    accumPx  = 0;
    $viewer.classList.remove("dragging");
});

// ─── Touch events ────────────────────────────────────────────────────────────

$viewer.addEventListener("touchstart", e => {
    const t  = e.touches[0];
    txStart  = t.clientX;
    tyStart  = t.clientY;
    tAxis    = null;
    dragging = true;
    lastX    = t.clientX;
    accumPx  = 0;
}, { passive: true });

$viewer.addEventListener("touchmove", e => {
    if (!dragging) return;
    const t  = e.touches[0];
    const dx = Math.abs(t.clientX - txStart);
    const dy = Math.abs(t.clientY - tyStart);

    // Determine axis on first significant movement.
    if (!tAxis) {
        if (dx > dy + 8)      tAxis = "h";
        else if (dy > dx + 8) tAxis = "v";
        else return;
    }

    if (tAxis === "v") {
        // Vertical scroll — release drag and let browser handle it.
        dragging = false;
        return;
    }

    accumPx += t.clientX - lastX;
    lastX    = t.clientX;
    flushAccum();
}, { passive: true });

$viewer.addEventListener("touchend", () => {
    dragging = false;
    accumPx  = 0;
    tAxis    = null;
}, { passive: true });

$viewer.addEventListener("touchcancel", () => {
    dragging = false;
    accumPx  = 0;
    tAxis    = null;
}, { passive: true });

// ─── Keyboard ────────────────────────────────────────────────────────────────

document.addEventListener("keydown", e => {
    if (e.key === "ArrowRight") stepBy(1);
    if (e.key === "ArrowLeft")  stepBy(-1);
});

// ─── Intro autoplay ──────────────────────────────────────────────────────────

function runAutoplay() {
    if (frames.length < 2) return;
    const msPerStep = 1000 / AUTOPLAY_FPS;
    let elapsed  = 0;
    let stepAcc  = 0;
    let last     = null;

    function tick(now) {
        if (last === null) last = now;
        const dt = now - last;
        last      = now;
        elapsed  += dt;
        stepAcc  += dt;

        while (stepAcc >= msPerStep) {
            stepAcc -= msPerStep;
            stepBy(1);
        }

        if (elapsed < AUTOPLAY_MS) requestAnimationFrame(tick);
    }
    requestAnimationFrame(tick);
}

// ─── Preload ─────────────────────────────────────────────────────────────────

function preloadAll() {
    // Start at current+1 so remaining frames load while first is already shown.
    const n = urls.length;
    for (let i = 1; i < n; i++) {
        const img = new Image();
        img.src = urls[(current + i) % n];
    }
}

// ─── Init ────────────────────────────────────────────────────────────────────

async function init() {
    try {
        const res = await fetch(`/api/scan/${SCAN_ID}/manifest`);
        if (!res.ok) throw new Error(`Manifest ${res.status}`);
        const manifest = await res.json();
        if (manifest.error) throw new Error(manifest.error);

        // Build frame list from manifest.frames.
        const raw = manifest.frames || [];
        const pairs = [];

        raw.forEach(f => {
            if (!f || f.discarded) return;
            const fname = (typeof f === "object") ? (f.filename || "") : String(f || "");
            if (!fname) return;
            const yaw = (typeof f === "object")
                ? (parseFloat(f.yaw_degrees) || parseFloat(f.heading) || 0)
                : 0;
            pairs.push({ fname, yaw });
        });

        if (!pairs.length) throw new Error("No frames in manifest.");

        // Sort by yaw ascending — canonical rotation order.
        pairs.sort((a, b) => a.yaw - b.yaw);

        frames = pairs.map(p => ({ filename: p.fname, yaw: p.yaw }));
        urls   = pairs.map(p => `/uploads/${SCAN_ID}/${p.fname}`);

        $name.textContent = manifest.scan_name || SCAN_ID;

        // Show first frame immediately (no crossfade).
        showFrame(0, true);

        // Hide loader once the first image is ready.
        function onReady() {
            $la.onload = $la.onerror = null;
            $loading.classList.add("fade");
            setTimeout(() => { $loading.style.display = "none"; }, 350);
            preloadAll();
            runAutoplay();
            setTimeout(() => { $hint.classList.add("gone"); }, 4000);
            track("viewer_open");
        }

        if ($la.complete && $la.naturalWidth) {
            onReady();
        } else {
            $la.onload  = onReady;
            $la.onerror = onReady; // show viewer even if first frame 404s
        }

    } catch (err) {
        $loading.style.display = "none";
        $errMsg.textContent    = err.message || "Could not load tour.";
        $error.classList.add("show");
    }
}

init();
</script>
</body>
</html>
